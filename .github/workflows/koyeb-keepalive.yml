name: Koyeb Keepalive

on:
  schedule:
    - cron: "*/10 * * * *" # каждые 10 минут
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Koyeb app
        env:
          KOYEB_KEEPALIVE_URL: ${{ secrets.KOYEB_KEEPALIVE_URL }}
        run: |
          if [ -z "$KOYEB_KEEPALIVE_URL" ]; then
            echo "KOYEB_KEEPALIVE_URL secret is not set"
            exit 1
          fi

          echo "Pinging $KOYEB_KEEPALIVE_URL"
          status_code=$(curl -m 10 -s -o /dev/null -w "%{http_code}" "$KOYEB_KEEPALIVE_URL")
          echo "Status code: $status_code"

          if [ "$status_code" -ne 200 ]; then
            echo "Unexpected status code from Koyeb app"
            exit 1
          fi
